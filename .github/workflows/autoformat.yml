name: Code Quality

# Runs on every push to main/develop, PRs, or manual trigger.
# Step order:
#   1. black   -- auto-format (rewrites files in-place)
#   2. isort   -- auto-sort imports (rewrites files in-place)
#   3. Commit fixes (if any) with [skip ci]
#   4. flake8  -- lint critical errors (hard fail if any E9/F63/F7/F82)
#   5. flake8  -- full style check (informational, exit-zero)
#   6. mypy    -- type check (informational, continue-on-error)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # ← allows manual run from GitHub Actions UI

jobs:
  autoformat-and-lint:
    name: Auto-format & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
          pip install -e ".[dev]" --quiet

      - name: Auto-format with black
        run: black --target-version py312 src/ tests/

      - name: Auto-sort imports with isort
        run: isort src/ tests/

      - name: Commit formatting fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format (black + isort) [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: "src/ tests/"

      - name: flake8 critical errors
        run: |
          flake8 src/ tests/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: flake8 full style
        run: |
          flake8 src/ tests/ \
            --count --exit-zero \
            --max-complexity=10 --statistics

      - name: mypy type check
        continue-on-error: true
        run: mypy src/v2ray_finder/ --ignore-missing-imports
