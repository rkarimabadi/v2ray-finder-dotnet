name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]    # trigger on push to main
  workflow_dispatch:        # allow manual run

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'   # use .NET 9 (compatible with 9.0.2)

      - name: Prepare Blazor WASM for GitHub Pages
        uses: na1307/blazor-github-pages@v4   # recommended action
        id: prepare
        with:
          project-path: src/V2RayFinder.Core.Wasm/src/V2RayFinder.Core.Wasm.csproj

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.prepare.outputs.wwwroot-path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4